<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>モツモツクライシス</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; position: fixed; }
        body { background: #1a0000; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; touch-action: none; font-family: sans-serif; -webkit-user-select: none; user-select: none; }
        #game-screen { position: relative; width: 360px; height: 500px; background: #222; border: 4px solid #440000; margin-top: 10px; overflow: hidden; border-radius: 10px; }
        
        .bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s; z-index: 1; pointer-events: none;}
        .bg-active { opacity: 1; }
        #bg-danger { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('./images/background_danger.png'); background-size: cover; background-position: center; opacity: 0; transition: opacity 0.5s; z-index: 2; pointer-events: none; }
        .danger-active { opacity: 1 !important; }

        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; pointer-events: none; z-index: 50; }
        #player { position: absolute; bottom: 10px; width: 70px; height: 70px; background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 10; }
        
        .motsu, .enemy, .special { position: absolute; width: 60px; height: 60px; background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 5; animation: puripuri 1s infinite; }
        .fast-mode { filter: drop-shadow(0 0 15px #ff0000) brightness(1.2); z-index: 8 !important; }
        .twins-effect { filter: drop-shadow(0 0 20px #ffd700); z-index: 9 !important; }

        @keyframes puripuri { 0%, 49% { transform: scaleX(1); } 50%, 100% { transform: scaleX(-1); } }
        @keyframes shiver { 0% { transform: translate(0, 0); } 25% { transform: translate(1px, -1px); } 50% { transform: translate(-1px, 1px); } 100% { transform: translate(0, 0); } }
        .shivering { animation: shiver 0.1s infinite !important; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); background-image: url('./images/title_bg.png'); background-size: cover; background-position: center; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; box-sizing: border-box; text-align: center; }
        
        .crisis-title-container { margin-bottom: 10px; perspective: 500px; }
        .title-part { font-family: 'Arial Black', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase; display: block; line-height: 0.8; position: relative; }
        .title-motsu { font-size: 44px; color: #fff; text-shadow: 0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25), 0 10px 10px rgba(0,0,0,.2), 0 20px 20px rgba(0,0,0,.15); animation: titleFloatMotsu 3s ease-in-out infinite; }
        .title-crisis { font-size: 48px; color: #ff0000; text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #ff0000, 0 0 40px #ff0000; animation: titlePulseCrisis 1.5s ease-in-out infinite; transform: rotateX(15deg) translateZ(20px); }
        @keyframes titleFloatMotsu { 0%, 100% { transform: translateY(0) rotateY(-5deg); } 50% { transform: translateY(-5px) rotateY(5deg); } }
        @keyframes titlePulseCrisis { 0%, 100% { transform: scale(1) rotateX(15deg); opacity: 1; } 50% { transform: scale(1.05) rotateX(10deg); opacity: 0.8; } }

        .how-to-play { font-size: 11px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 8px; margin: 10px 0; border: 1px solid #444; width: 90%; line-height: 1.4; }
        .how-to-play b { color: #ff0; }

        .selector-label { font-size: 14px; margin-top: 5px; color: #ccc; }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 8px; }
        .mode-btn { padding: 5px 15px; background: #333; border: 2px solid #555; color: #fff; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .mode-btn.selected { border-color: #ff0000; background: #600; }

        .char-selector { display: flex; gap: 10px; margin: 5px 0; }
        .char-btn { width: 50px; height: 50px; border: 3px solid #555; border-radius: 10px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: rgba(255,255,255,0.1); cursor: pointer; }
        .char-btn.selected { border-color: #ff0000; background-color: rgba(255,0,0,0.3); box-shadow: 0 0 10px #ff0000; }

        .sound-switch { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; border: 1px solid #777; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .ingame-sound-switch { position: absolute; bottom: -35px; left: 50%; transform: translateX(-50%); white-space: nowrap; pointer-events: auto; z-index: 30; }

        .shogo-gold { color: #D4AF37 !important; } 
        /* 称号の視認性修正: 臙脂の文字を白で囲う */
        .shogo-enji { color: #800000 !important; text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 0px 0px 5px #fff !important; font-weight: bold; } 
        .shogo-mizu { color: #00BFFF !important; } 
        .shogo-kiiro { color: #D19E1A !important; } 

        .action-btn { padding: 12px 20px; font-size: 20px; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #aa0000; border-bottom: 5px solid #660000; width: 180px; margin-top: 5px; outline: none; }
        /* リザルト画面のボタン幅調整（1列表示用） */
        .result-btn { width: 240px !important; }

        #ui-layer { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; font-weight: bold; text-shadow: 2px 2px #000; z-index: 20; pointer-events: none; font-size: 14px; }
        .btn { width: 100px; height: 70px; font-size: 30px; color: white; background: #880000; border: none; border-bottom: 6px solid #440000; border-radius: 15px; cursor: pointer; touch-action: none; }
        .pause-btn { width: 80px; height: 70px; font-size: 14px; background: #555; border-bottom-color: #333; }

        #result-screen { display: none; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="bg-container">
            <div class="bg-layer bg-active" style="background-image: url('./images/background1.png');"></div>
            <div class="bg-layer" style="background-image: url('./images/background2.png');"></div>
            <div class="bg-layer" style="background-image: url('./images/background3.png');"></div>
            <div class="bg-layer" style="background-image: url('./images/background4.png');"></div>
            <div class="bg-layer" style="background-image: url('./images/background5.png');"></div>
            <div class="bg-layer" style="background-image: url('./images/background6.png');"></div>
        </div>
        <div id="bg-danger"></div>
        <div id="damage-flash"></div>

        <div id="title-screen" class="overlay">
            <div class="crisis-title-container">
                <span class="title-part title-motsu">モツモツ</span>
                <span class="title-part title-crisis">クライシス</span>
            </div>

            <div id="best-info" style="font-size:14px; margin-bottom:5px;">
                最高記録: <span id="best-score-text">0</span> 点 (<span id="best-shogo-text">いちげんさん</span>)
            </div>
            
            <div class="how-to-play">
                左右ボタンで移動。降ってくるモツを拾え！<br>
                <b>赤オーラモツ</b>: 3倍速＆高得点 / <b>梅割り</b>: 体力回復＆得点<br>
                <b>twins(超レア)</b>: 体力最大回復＆1000点<br>
                <b>靴・ボトル</b>: ダメージ！当たると体力が減るぞ。
            </div>

            <div class="selector-label">難易度：</div>
            <div class="mode-selector">
                <button class="mode-btn" id="mode-easy" onclick="selectMode('easy')">イージー</button>
                <button class="mode-btn selected" id="mode-hard" onclick="selectMode('hard')">ハード</button>
            </div>

            <div class="selector-label">呑んべぇ：</div>
            <div class="char-selector">
                <div class="char-btn selected" id="btn-A" onclick="selectChar('A')" style="background-image:url('./images/playerA1.png')"></div>
                <div class="char-btn" id="btn-B" onclick="selectChar('B')" style="background-image:url('./images/playerB1.png')"></div>
                <div class="char-btn" id="btn-C" onclick="selectChar('C')" style="background-image:url('./images/playerC1.png')"></div>
                <div class="char-btn" id="btn-D" onclick="selectChar('D')" style="background-image:url('./images/playerD1.png')"></div>
            </div>

            <div class="sound-switch" onpointerdown="toggleSound()">音設定: <span class="sound-status-text">ON</span></div>
            <button class="action-btn" onpointerdown="startGame()">宴開始</button>
        </div>

        <div id="result-screen" class="overlay">
            <h1 style="color:#ff0000; font-size:40px; margin:0;">宴 終 了</h1>
            <div id="final-score" style="font-size:24px; margin:15px 0;">0 点</div>
            <div id="final-shogo" style="font-size:18px; margin-bottom:20px;"></div>
            <button class="action-btn result-btn" onclick="location.reload()">もう一杯！（戻る）</button>
        </div>

        <div id="ui-layer">
            <div id="hp-display">体力: ❤️❤️❤️</div>
            <div id="score-board">0点</div>
            <div id="chain-display">連続: 0</div>
            <div class="sound-switch ingame-sound-switch" onpointerdown="toggleSound()">
                音: <span class="sound-status-text">ON</span>
            </div>
        </div>
        <div id="player"></div>
    </div>

    <div style="margin-top:10px; display:flex; gap:15px; align-items:center;">
        <button class="btn" onpointerdown="moveLeft()">◀</button>
        <button class="btn pause-btn" id="btn-pause" onpointerdown="togglePause()">一時停止</button>
        <button class="btn" onpointerdown="moveRight()">▶</button>
    </div>

    <script>
        const totalLines = 5, lineWidth = 360 / totalLines;
        let soundEnabled = true, isPaused = false;
        let selectedChar = 'A', selectedMode = 'hard';

        const bgmFiles = ['./audio/bgm1.mp3', './audio/bgm2.mp3', './audio/bgm3.mp3', './audio/bgm4.mp3', './audio/bgm5.mp3', './audio/bgm6.mp3'];
        let currentBgmIndex = -1, currentBgm = null;

        const sounds = {
            damage: new Audio('./audio/damage.mp3'),
            siren: new Audio('./audio/siren.mp3'),
            heal: new Audio('./audio/heal.mp3'),
            get: new Audio('./audio/get.mp3'),
            twins: new Audio('./audio/twins.mp3'),
            selectA: new Audio('./audio/selectA.mp3'),
            selectB: new Audio('./audio/selectB.mp3'),
            selectC: new Audio('./audio/selectC.mp3'),
            selectD: new Audio('./audio/selectD.mp3')
        };
        sounds.siren.loop = true;

        function playBgm() {
            if (!soundEnabled) return;
            let nextIndex;
            do { nextIndex = Math.floor(Math.random() * bgmFiles.length); } while (nextIndex === currentBgmIndex && bgmFiles.length > 1);
            const nextBgm = new Audio(bgmFiles[nextIndex]);
            nextBgm.loop = false;
            nextBgm.volume = 0;
            const targetVolume = 0.3; // BGM音量を全体的に下げて修正
            nextBgm.onended = () => { if (isGameRunning && soundEnabled) playBgm(); };
            if (currentBgm) {
                let vol = targetVolume;
                const prevBgm = currentBgm;
                const fadeInterval = setInterval(() => {
                    if (isPaused) return;
                    vol -= 0.02;
                    if (vol <= 0) { clearInterval(fadeInterval); prevBgm.pause(); prevBgm.currentTime = 0; }
                    else { prevBgm.volume = vol; nextBgm.volume = targetVolume - vol; }
                }, 100);
            } else { nextBgm.volume = targetVolume; }
            currentBgm = nextBgm; currentBgmIndex = nextIndex; currentBgm.play().catch(()=>{});
        }

        function togglePause() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
            const btn = document.getElementById('btn-pause');
            btn.innerText = isPaused ? "再開" : "一時停止";
            btn.style.background = isPaused ? "#aa0000" : "#555";
            if (isPaused) {
                if (currentBgm) currentBgm.pause();
                sounds.siren.pause();
            } else {
                if (soundEnabled) {
                    if (currentBgm) currentBgm.play().catch(()=>{});
                    if (hp === 1) sounds.siren.play().catch(()=>{});
                }
            }
        }

        function selectMode(m) {
            selectedMode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById(`mode-${m}`).classList.add('selected');
        }

        function selectChar(type) {
            selectedChar = type;
            document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById(`btn-${type}`).classList.add('selected');
            if (soundEnabled) {
                const s = sounds[`select${type}`];
                if (s) { s.currentTime = 0; s.play().catch(()=>{}); }
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.querySelectorAll('.sound-status-text').forEach(el => el.innerText = soundEnabled ? "ON" : "OFF");
            if (!soundEnabled) { 
                if (currentBgm) currentBgm.pause();
                Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; }); 
            } else if (isGameRunning && !isPaused) { 
                if (currentBgm) currentBgm.play().catch(()=>{});
                if(hp === 1) sounds.siren.play().catch(()=>{});
            }
        }

        function playSfx(audio) { if (soundEnabled && audio && !isPaused) { audio.currentTime = 0; audio.play().catch(()=>{}); } }

        let score, hp, maxHp, chainCount, playerLine, isGameRunning = false, playerImgIdx = 1;
        let spawnMotsuInterval, spawnEnemyInterval, bgInterval, playerAnimInterval, bgmInterval;
        let lastLineMotsu = -1, lastLineEnemy = -1, baseSpeed = 1.3;

        const motsuList = ['./images/shiro.png', './images/hatsu.png', './images/lever.png', './images/abura.png', './images/kasira.png', './images/gatsu.png', './images/nankotsu.png'];

        function getShogoData(s) {
            if (s >= 15000) return { text: "レジェンド", class: "shogo-gold" };
            if (s >= 5000) return { text: "常連さん", class: "shogo-enji" };
            if (s >= 2500) return { text: "お客さん", class: "shogo-mizu" };
            if (s >= 1000) return { text: "御新規さん", class: "shogo-kiiro" };
            return { text: "いちげんさん", class: "" };
        }

        window.onload = () => {
            const best = parseInt(localStorage.getItem('motsu_best_score') || '0');
            document.getElementById('best-score-text').innerText = best;
            const shogo = getShogoData(best);
            const el = document.getElementById('best-shogo-text');
            el.innerText = shogo.text; el.className = shogo.class;
        };

        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true; isPaused = false;
            document.getElementById('title-screen').style.display = 'none';
            playBgm();
            bgmInterval = setInterval(() => { if(!isPaused) playBgm(); }, 60000);
            if (selectedMode === 'easy') { hp = 5; maxHp = 5; baseSpeed = 0.8; spawnMotsuInterval = setInterval(spawnMotsu, 1800); }
            else { hp = 3; maxHp = 3; baseSpeed = 1.3; spawnMotsuInterval = setInterval(spawnMotsu, 1400); }
            score = 0; chainCount = 0; playerLine = 2; playerImgIdx = 1;
            updateUI(); updatePlayerPos();
            playerAnimInterval = setInterval(() => { if(!isPaused) { playerImgIdx = (playerImgIdx === 1) ? 2 : 1; updatePlayerPos(); } }, 1000);
            spawnEnemyInterval = setInterval(spawnEnemy, 2000);
            bgInterval = setInterval(() => { if(!isPaused) switchBackground(); }, 30000);
        }

        function spawnMotsu() {
            if (!isGameRunning || isPaused) return;
            let line; do { line = Math.floor(Math.random() * totalLines); } while (line === lastLineMotsu);
            lastLineMotsu = line;
            const motsu = document.createElement('div');
            let isTwins = Math.random() < 0.01; 
            let isHeal = !isTwins && Math.random() < 0.05, img;
            if (isTwins) { motsu.className = 'special'; motsu.classList.add('twins-effect'); img = './images/twins.png'; }
            else { motsu.className = 'motsu'; img = isHeal ? './images/umewari.png' : motsuList[Math.floor(Math.random() * motsuList.length)]; }
            let isFast = !isTwins && Math.random() < 0.15, speed = baseSpeed * (isFast ? 3.0 : 1.0);
            if (isFast) motsu.classList.add('fast-mode');
            motsu.style.backgroundImage = `url('${img}')`;
            motsu.style.left = (line * lineWidth + (lineWidth - 60)/2) + 'px';
            let top = -70; document.getElementById('game-screen').appendChild(motsu);
            function fall() {
                if (!isGameRunning) { motsu.remove(); return; }
                if (!isPaused) {
                    top += speed; motsu.style.top = top + 'px';
                    if (top > 380 && top < 450 && line === playerLine) {
                        if (isTwins) { hp = Math.min(maxHp, hp + 3); score += 1000; playSfx(sounds.twins); }
                        else if (isHeal) {
                            if (hp === maxHp) { score += 300; } else { hp++; score += 100; }
                            playSfx(sounds.heal);
                        }
                        else { chainCount++; score += (isFast ? 50 : 10); if (chainCount % 10 === 0) score += 5; playSfx(sounds.get); }
                        updateUI(); motsu.remove(); return;
                    }
                    if (top > 500) { if (!isHeal && !isTwins) { chainCount = 0; updateUI(); } motsu.remove(); return; }
                }
                requestAnimationFrame(fall);
            }
            requestAnimationFrame(fall);
        }

        function spawnEnemy() {
            if (!isGameRunning || isPaused) return;
            let line; do { line = Math.floor(Math.random() * totalLines); } while (line === lastLineEnemy);
            lastLineEnemy = line;
            const enemy = document.createElement('div'); enemy.className = 'enemy';
            const isShoe = Math.random() < 0.5;
            enemy.style.backgroundImage = isShoe ? "url('./images/shoe.png')" : "url('./images/bottle.png')";
            let speed = baseSpeed * 2.5, top = -70, startTime = Date.now();
            enemy.style.left = (line * lineWidth + (lineWidth - 60)/2) + 'px';
            document.getElementById('game-screen').appendChild(enemy);
            function fall() {
                if (!isGameRunning) { enemy.remove(); return; }
                if (!isPaused) {
                    top += speed;
                    let horizontal = isShoe ? Math.sin((Date.now() - startTime) / 100) * 15 : 0;
                    enemy.style.top = top + 'px';
                    enemy.style.transform = `translateX(${horizontal}px) rotate(${isShoe ? (top % 360) : 0}deg)`;
                    if (top > 380 && top < 450 && line === playerLine) {
                        hp--; playSfx(sounds.damage);
                        document.getElementById('damage-flash').style.opacity = "0.7";
                        setTimeout(() => { if(document.getElementById('damage-flash')) document.getElementById('damage-flash').style.opacity = "0"; }, 150);
                        updateUI(); enemy.remove(); if (hp <= 0) gameOver(); return;
                    }
                    if (top > 500) { enemy.remove(); return; }
                } else { startTime += 16; } 
                requestAnimationFrame(fall);
            }
            requestAnimationFrame(fall);
        }

        function switchBackground() {
            const bgs = document.querySelectorAll('.bg-layer');
            let nextIdx = Math.floor(Math.random() * bgs.length);
            bgs.forEach(b => b.classList.remove('bg-active')); bgs[nextIdx].classList.add('bg-active');
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(spawnMotsuInterval); clearInterval(spawnEnemyInterval); 
            clearInterval(bgInterval); clearInterval(playerAnimInterval); clearInterval(bgmInterval);
            if (currentBgm) { currentBgm.pause(); currentBgm.onended = null; }
            sounds.siren.pause(); document.getElementById('player').classList.add('shivering');
            const best = parseInt(localStorage.getItem('motsu_best_score') || '0');
            if (score > best) localStorage.setItem('motsu_best_score', score);
            const shogo = getShogoData(score);
            document.getElementById('final-score').innerText = score + " 点";
            document.getElementById('final-shogo').innerText = "称号: " + shogo.text;
            document.getElementById('final-shogo').className = shogo.class;
            document.getElementById('result-screen').style.display = 'flex';
        }

        function updateUI() {
            document.getElementById('hp-display').innerText = "体力: " + "❤️".repeat(Math.max(0, hp));
            document.getElementById('score-board').innerText = score + "点";
            document.getElementById('chain-display').innerText = "連続: " + chainCount;
            if (hp === 1 && isGameRunning) {
                document.getElementById('bg-danger').classList.add('danger-active');
                if (soundEnabled && sounds.siren.paused && !isPaused) sounds.siren.play().catch(()=>{});
            } else { document.getElementById('bg-danger').classList.remove('danger-active'); sounds.siren.pause(); }
        }

        function updatePlayerPos() {
            const p = document.getElementById('player');
            p.style.left = (playerLine * lineWidth + (lineWidth - 70)/2) + 'px';
            p.style.backgroundImage = `url('./images/player${selectedChar}${playerImgIdx}.png')`;
        }

        window.moveLeft = () => { if(playerLine > 0 && isGameRunning && !isPaused) { playerLine--; updatePlayerPos(); } };
        window.moveRight = () => { if(playerLine < totalLines - 1 && isGameRunning && !isPaused) { playerLine++; updatePlayerPos(); } };
    </script>
</body>
</html>
